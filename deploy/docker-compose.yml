services:
  db:
    image: postgres:16
    container_name: anzuimg-db
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ANZUIMG_DB_USER:-anzuuser} -d ${ANZUIMG_DB_NAME:-anzuimg}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${ANZUIMG_DB_USER:-anzuuser}
      POSTGRES_PASSWORD: ${ANZUIMG_DB_PASSWORD:-anzupass}
      POSTGRES_DB: ${ANZUIMG_DB_NAME:-anzuimg}
    volumes:
      - anzuimg-db-data:/var/lib/postgresql/data
    networks:
      anzuimg-internal:
        ipv4_address: 172.30.250.2

  backend-permissions:
    image: alpine:edge
    user: "0:0"
    restart: "no"
    network_mode: none
    command: ["sh", "-c", "chown -R 10001:10001 /data/images /data/logs /data/tmp"]
    volumes:
      - anzuimg-images:/data/images
      - anzuimg-logs:/data/logs
      - anzuimg-tmp:/data/tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: anzuimg-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend-permissions:
        condition: service_completed_successfully
    environment:
      ANZUIMG_SERVER_ADDR: ":8080"
      ANZUIMG_SHUTDOWN_TIMEOUT_SEC: ${ANZUIMG_SHUTDOWN_TIMEOUT_SEC:-10}
      ANZUIMG_API_PREFIX: ${ANZUIMG_API_PREFIX:-}

      ANZUIMG_DB_HOST: db
      ANZUIMG_DB_PORT: "5432"
      ANZUIMG_DB_USER: ${ANZUIMG_DB_USER:-anzuuser}
      ANZUIMG_DB_PASSWORD: ${ANZUIMG_DB_PASSWORD:-anzupass}
      ANZUIMG_DB_NAME: ${ANZUIMG_DB_NAME:-anzuimg}
      ANZUIMG_DB_SSLMODE: "disable"

      ANZUIMG_STORAGE_BASE: "/data/images"
      ANZUIMG_STORAGE_TYPE: ${ANZUIMG_STORAGE_TYPE:-local}

      # 云存储配置 (S3)
      ANZUIMG_CLOUD_ENDPOINT: ${ANZUIMG_CLOUD_ENDPOINT:-}
      ANZUIMG_CLOUD_BUCKET: ${ANZUIMG_CLOUD_BUCKET:-}
      ANZUIMG_CLOUD_REGION: ${ANZUIMG_CLOUD_REGION:-}
      ANZUIMG_CLOUD_ACCESS_KEY: ${ANZUIMG_CLOUD_ACCESS_KEY:-}
      ANZUIMG_CLOUD_SECRET_KEY: ${ANZUIMG_CLOUD_SECRET_KEY:-}
      ANZUIMG_CLOUD_USE_SSL: ${ANZUIMG_CLOUD_USE_SSL:-true}

      # CORS 配置
      ANZUIMG_ALLOWED_ORIGINS: ${ANZUIMG_ALLOWED_ORIGINS:-http://localhost:9200}

      # Passkey配置
      ANZUIMG_PASSKEY_RP_ID: ${ANZUIMG_PASSKEY_RP_ID:-localhost}
      ANZUIMG_PASSKEY_RP_ORIGIN: ${ANZUIMG_PASSKEY_RP_ORIGIN:-http://localhost:9200}
      ANZUIMG_PASSKEY_RP_DISPLAY_NAME: ${ANZUIMG_PASSKEY_RP_DISPLAY_NAME:-AnzuImg}

      # 生产环境建议设置：初始化保护 token（完成初始化后可移除）
      ANZUIMG_SETUP_TOKEN: ${ANZUIMG_SETUP_TOKEN:-}

      # 默认仅信任 Compose 内固定的 frontend 代理；其他代理必须显式配置精确 IP/CIDR。
      ANZUIMG_TRUSTED_PROXIES: ${ANZUIMG_TRUSTED_PROXIES:-172.30.250.4/32}
      # 客户端 IP 读取头顺序，按顺序尝试
      ANZUIMG_CLIENT_IP_HEADERS: ${ANZUIMG_CLIENT_IP_HEADERS:-X-Forwarded-For,X-Real-IP}
      # XFF 解析策略：trusted / rightmost
      ANZUIMG_CLIENT_IP_XFF_STRATEGY: ${ANZUIMG_CLIENT_IP_XFF_STRATEGY:-trusted}

      # 上传限制
      ANZUIMG_MAX_UPLOAD_MB: ${ANZUIMG_MAX_UPLOAD_MB:-110}
      ANZUIMG_MAX_UPLOAD_FILE_MB: ${ANZUIMG_MAX_UPLOAD_FILE_MB:-60}
      ANZUIMG_MAX_UPLOAD_FILES: ${ANZUIMG_MAX_UPLOAD_FILES:-20}

      # Cookie SameSite
      ANZUIMG_COOKIE_SAMESITE: ${ANZUIMG_COOKIE_SAMESITE:-Lax}

      ANZUIMG_STRICT_SESSION_IP: ${ANZUIMG_STRICT_SESSION_IP:-false}

      # 是否允许 Web 端修改运行时配置,关掉则系统配置区只读
      ANZUIMG_ALLOW_WEB_CONFIG: ${ANZUIMG_ALLOW_WEB_CONFIG:-true}
      # 应用日志文件输出目录
      ANZUIMG_LOG_FILE_DIR: ${ANZUIMG_LOG_FILE_DIR:-/data/logs}
      TMPDIR: /data/tmp
    volumes:
      - anzuimg-images:/data/images
      - anzuimg-logs:/data/logs
      - anzuimg-tmp:/data/tmp
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: ${ANZUIMG_BACKEND_MEMORY_LIMIT:-2g}
    cpus: ${ANZUIMG_BACKEND_CPU_LIMIT:-2.0}
    ports:
      - "127.0.0.1:9211:8080"
    networks:
      anzuimg-internal:
        ipv4_address: 172.30.250.3

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        ANZUIMG_FRONTEND_BACKEND_URL: ${ANZUIMG_FRONTEND_BACKEND_URL:-http://backend:8080}
        ANZUIMG_FRONTEND_APP_BASE_URL: ${ANZUIMG_FRONTEND_APP_BASE_URL:-/}
        ANZUIMG_FRONTEND_API_PREFIX: ${ANZUIMG_FRONTEND_API_PREFIX:-/kotori}
    container_name: anzuimg-frontend
    restart: always
    environment:
      # Nuxt服务端请求后端 (容器间通信)
      ANZUIMG_FRONTEND_BACKEND_URL: ${ANZUIMG_FRONTEND_BACKEND_URL:-http://backend:8080}
      # 子路径部署与 API 前缀（反向代理场景）
      ANZUIMG_FRONTEND_APP_BASE_URL: ${ANZUIMG_FRONTEND_APP_BASE_URL:-/}
      ANZUIMG_FRONTEND_API_PREFIX: ${ANZUIMG_FRONTEND_API_PREFIX:-/kotori}
    ports:
      - "127.0.0.1:9200:3000"
    networks:
      anzuimg-internal:
        ipv4_address: 172.30.250.4

volumes:
  anzuimg-db-data:
  anzuimg-images:
  anzuimg-logs:
  anzuimg-tmp:

networks:
  anzuimg-internal:
    ipam:
      config:
        - subnet: 172.30.250.0/24
